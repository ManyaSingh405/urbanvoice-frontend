<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Main green-to-cyan gradient -->
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <!-- Subtle inner glow -->
    <radialGradient id="glow" cx="50%" cy="45%" r="55%">
      <stop offset="0%"   stop-color="#4ade80" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
    <!-- Drop shadow filter -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#22c55e" flood-opacity="0.35"/>
    </filter>
    <!-- Clip to rounded square -->
    <clipPath id="clip">
      <rect width="200" height="200" rx="44" ry="44"/>
    </clipPath>
  </defs>

  <!-- Background: dark navy rounded square -->
  <rect width="200" height="200" rx="44" ry="44" fill="#0a0f1e"/>

  <!-- Subtle radial glow on bg -->
  <rect width="200" height="200" rx="44" ry="44" fill="url(#glow)" clip-path="url(#clip)"/>

  <!-- Thin border ring -->
  <rect width="200" height="200" rx="44" ry="44" fill="none" stroke="url(#g1)" stroke-width="1.5" opacity="0.35"/>

  <!-- ── ICON: stylised sound wave / location pin hybrid ── -->
  <!-- 
    Concept: A map pin shape whose body contains 3 concentric arcs 
    representing a broadcast / voice signal — civic voice reaching outward.
    The pin tail points down-center. Clean, minimal, memorable.
  -->

  <!-- Pin outer teardrop body -->
  <path d="M100 28
    C74 28 53 49 53 75
    C53 101 76 122 100 148
    C124 122 147 101 147 75
    C147 49 126 28 100 28Z"
    fill="url(#g1)" filter="url(#shadow)" opacity="0.92"/>

  <!-- White inner circle (cutout feel) -->
  <circle cx="100" cy="75" r="26" fill="#0a0f1e"/>

  <!-- 3 signal arcs inside the pin — voice/broadcast waves -->
  <!-- Innermost arc -->
  <path d="M88 75 A12 12 0 0 1 112 75"
    fill="none" stroke="url(#g1)" stroke-width="3" stroke-linecap="round"/>
  <!-- Middle arc -->
  <path d="M82 68 A20 20 0 0 1 118 68"
    fill="none" stroke="url(#g1)" stroke-width="2.5" stroke-linecap="round" opacity="0.75"/>
  <!-- Outer arc -->
  <path d="M76 61 A28 28 0 0 1 124 61"
    fill="none" stroke="url(#g1)" stroke-width="2" stroke-linecap="round" opacity="0.45"/>

  <!-- Center dot -->
  <circle cx="100" cy="75" r="4" fill="url(#g1)"/>
</svg>
