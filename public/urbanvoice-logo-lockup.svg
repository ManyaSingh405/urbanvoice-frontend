<svg width="520" height="120" viewBox="0 0 520 120" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="45%" r="55%">
      <stop offset="0%"   stop-color="#4ade80" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#22c55e" flood-opacity="0.3"/>
    </filter>
    <clipPath id="clip">
      <rect x="10" y="10" width="100" height="100" rx="22" ry="22"/>
    </clipPath>
  </defs>

  <!-- Icon box -->
  <rect x="10" y="10" width="100" height="100" rx="22" ry="22" fill="#0a0f1e"/>
  <rect x="10" y="10" width="100" height="100" rx="22" ry="22" fill="url(#glow)" clip-path="url(#clip)"/>
  <rect x="10" y="10" width="100" height="100" rx="22" ry="22" fill="none" stroke="url(#g1)" stroke-width="1" opacity="0.3"/>

  <!-- Pin body (scaled to 100x100 box, offset by 10,10) -->
  <path d="M60 18
    C44 18 32 30 32 46
    C32 62 47 74 60 88
    C73 74 88 62 88 46
    C88 30 76 18 60 18Z"
    fill="url(#g1)" filter="url(#shadow)" opacity="0.92"/>
  <circle cx="60" cy="46" r="14" fill="#0a0f1e"/>

  <!-- Signal arcs -->
  <path d="M52 46 A8 8 0 0 1 68 46"  fill="none" stroke="url(#g1)" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M47 40 A14 14 0 0 1 73 40" fill="none" stroke="url(#g1)" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
  <path d="M42 34 A20 20 0 0 1 78 34" fill="none" stroke="url(#g1)" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
  <circle cx="60" cy="46" r="3" fill="url(#g1)"/>

  <!-- Wordmark: Urban -->
  <text x="132" y="58"
    font-family="'Outfit', 'Inter', system-ui, sans-serif"
    font-weight="800"
    font-size="46"
    fill="#f1f5f9"
    letter-spacing="-1">Urban</text>

  <!-- Wordmark: Voice (gradient) -->
  <defs>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#4ade80"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
  </defs>
  <text x="132" y="100"
    font-family="'Outfit', 'Inter', system-ui, sans-serif"
    font-weight="800"
    font-size="46"
    fill="url(#textGrad)"
    letter-spacing="-1">Voice</text>
</svg>
